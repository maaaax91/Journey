<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:'Georgia',serif;color:#f5e6c8;overflow:hidden;height:100vh;width:100vw}
#app{width:100%;height:100%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.2}to{opacity:1}}
.glitter{position:fixed;pointer-events:none;z-index:1;border-radius:50%;animation:gFloat var(--gd) linear infinite;opacity:0}
@keyframes gFloat{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:.8}100%{transform:translateY(-10vh) rotate(720deg);opacity:0}}
#cover{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#2d1b4e 0%,#0d0d1a 100%);transition:opacity 1.5s ease}
.cover-title{font-size:clamp(1.6rem,4vw,2.8rem);color:#f5d77e;text-align:center;text-shadow:0 0 30px #f5d77e88;animation:glow 3s ease-in-out infinite alternate;line-height:1.3;padding:0 20px}
.cover-sub{font-style:italic;font-size:clamp(.9rem,2vw,1.2rem);color:#c9a96e;margin-top:12px;opacity:.85}
@keyframes glow{from{text-shadow:0 0 20px #f5d77e44}to{text-shadow:0 0 50px #f5d77ecc,0 0 80px #f5d77e44}}
.cover-hearts{margin-top:30px;font-size:2rem;animation:hb 1.8s ease-in-out infinite}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.start-btn{margin-top:40px;padding:14px 40px;background:linear-gradient(135deg,#f5d77e,#e8a44a);color:#2d1b4e;border:none;border-radius:50px;font-family:'Georgia',serif;font-size:1rem;cursor:pointer;box-shadow:0 4px 20px #f5d77e55;transition:transform .2s,box-shadow .2s}
.start-btn:hover{transform:scale(1.05);box-shadow:0 6px 30px #f5d77e88}
#scene{position:absolute;inset:0;z-index:5;display:none;flex-direction:column;align-items:center;justify-content:space-between;padding:16px 16px 120px 16px}
.ch-header{text-align:center;z-index:2;width:100%}
.ch-num{font-size:.7rem;letter-spacing:3px;color:#c9a96e;text-transform:uppercase;opacity:.7}
.ch-title{font-size:clamp(1.1rem,3vw,1.8rem);color:#f5d77e;margin-top:4px;text-shadow:0 0 20px #f5d77e66}
.illus{flex:1;width:100%;max-width:520px;position:relative;display:flex;align-items:center;justify-content:center;margin:8px 0}
.illus svg{width:100%;height:100%;max-height:52vh;filter:drop-shadow(0 4px 20px rgba(0,0,0,.5))}
.ch-text{text-align:center;max-width:480px;z-index:2}
.ch-text p{font-style:italic;font-size:clamp(.85rem,2vw,1.05rem);color:#f0ddb5;line-height:1.7;text-shadow:0 1px 8px rgba(0,0,0,.5)}
.hint{font-size:.7rem;color:#c9a96e88;margin-top:6px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.nav-bar{display:flex;align-items:center;gap:16px;margin-top:10px;z-index:2}
.nav-btn{width:44px;height:44px;border-radius:50%;border:2px solid #f5d77e66;background:rgba(245,215,126,.1);color:#f5d77e;font-size:1.2rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:rgba(245,215,126,.25);border-color:#f5d77e}
.nav-btn:disabled{opacity:.25;cursor:default}
.dots{display:flex;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#f5d77e44;transition:background .3s;cursor:pointer}
.dot.active{background:#f5d77e}
.bg-digital{background:radial-gradient(ellipse at 30% 70%,#1a1a3e 0%,#0d0d1a 100%)}
.bg-autumn{background:radial-gradient(ellipse at 50% 30%,#3d1f0a 0%,#1a0d05 100%)}
.bg-winter{background:radial-gradient(ellipse at 50% 50%,#0d1f3d 0%,#05080d 100%)}
.bg-summer{background:radial-gradient(ellipse at 50% 80%,#0a2a3d 0%,#050a0d 100%)}
.bg-nature{background:radial-gradient(ellipse at 50% 50%,#0a2410 0%,#050d07 100%)}
.bg-warm{background:radial-gradient(ellipse at 50% 60%,#2d1505 0%,#0d0805 100%)}
.bg-night{background:radial-gradient(ellipse at 50% 20%,#1a1040 0%,#050508 100%)}
.bg-final{background:radial-gradient(ellipse at 50% 80%,#2d1f05 0%,#0d0a05 100%)}
.clickable{cursor:pointer;}
svg{pointer-events:all;}
.popup{position:fixed;background:rgba(30,15,50,.95);border:1px solid #f5d77e66;border-radius:12px;padding:12px 18px;font-style:italic;color:#f5d77e;font-size:.85rem;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:200;max-width:220px;animation:popIn .3s ease;pointer-events:none}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
#overlay{position:fixed;inset:0;background:#0d0d1a;z-index:100;pointer-events:none;opacity:0;transition:opacity .6s ease}
#overlay.fade-in{opacity:1}
</style>
</head>
<body>
<div id="stars"></div>
<div id="overlay"></div>
<div id="app">
  <div id="cover">
    <div class="cover-title">Max &amp; Susi</div>
    <div class="cover-sub">Eine Reise voller kleiner Wunder</div>
    <div class="cover-hearts">✨💛✨</div>
    <button class="start-btn" id="startBtn">Unsere Geschichte beginnen ›</button>
  </div>
  <div id="scene">
    <div class="ch-header">
      <div class="ch-num" id="chapNum"></div>
      <div class="ch-title" id="chapTitle"></div>
    </div>
    <div class="illus" id="illus"></div>
    <div class="ch-text">
      <p id="chapText"></p>
      <div class="hint" id="chapHint"></div>
    </div>
    <div class="nav-bar">
      <button class="nav-btn" id="prevBtn">‹</button>
      <div class="dots" id="dots"></div>
      <button class="nav-btn" id="nextBtn">›</button>
    </div>
  </div>
</div>
<script>
// ── stars & glitter ──────────────────────────────────────────────
var starsEl = document.getElementById('stars');
for(var i=0;i<120;i++){
  var s=document.createElement('div'); s.className='star';
  var sz=Math.random()*2.5+.5;
  s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;--d:'+(Math.random()*3+1).toFixed(1)+'s';
  starsEl.appendChild(s);
}
for(var i=0;i<18;i++){
  var g=document.createElement('div'); g.className='glitter';
  var sz=Math.random()*4+2;
  var cols=['#f5d77e','#e8a44a','#c9a96e','#d4a8ff','#a8d4ff'];
  g.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;background:'+cols[Math.floor(Math.random()*cols.length)]+';--gd:'+(Math.random()*8+4).toFixed(1)+'s;animation-delay:'+(Math.random()*8).toFixed(1)+'s';
  document.body.appendChild(g);
}

// ── popup ────────────────────────────────────────────────────────
var popupEl=null, popupTimer=null;
function showPopup(text,x,y){
  if(popupEl){popupEl.remove();popupEl=null;}
  if(popupTimer){clearTimeout(popupTimer);popupTimer=null;}
  popupEl=document.createElement('div'); popupEl.className='popup';
  popupEl.textContent=text;
  var pw=220,ph=60;
  var cx=Math.min(Math.max(x-pw/2,8),window.innerWidth-pw-8);
  var cy=Math.min(Math.max(y-ph-12,8),window.innerHeight-ph-8);
  popupEl.style.left=cx+'px'; popupEl.style.top=cy+'px';
  document.body.appendChild(popupEl);
  popupTimer=setTimeout(function(){if(popupEl){popupEl.remove();popupEl=null;}},2500);
}

// ── SVG helpers ──────────────────────────────────────────────────
function mkSVG(body){ return '<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">'+body+'</svg>'; }

function susiSVG(x,y,sc,flip,jacket){
  if(sc===undefined)sc=1; if(flip===undefined)flip=false; if(jacket===undefined)jacket=false;
  var t=flip?'transform="translate('+x+','+y+') scale('+ (-sc)+','+sc+') translate(-30,0)"':'transform="translate('+x+','+y+') scale('+sc+')"';
  var bc=jacket?'#c0282a':'#1a1a1a';
  var ac=jacket?'#c0282a':'#f0c080';
  return '<g '+t+'>'
    +'<ellipse cx="15" cy="52" rx="11" ry="18" fill="'+bc+'"/>'
    +'<rect x="6" y="65" width="9" height="40" rx="3" fill="#111"/>'
    +'<rect x="16" y="65" width="9" height="40" rx="3" fill="#111"/>'
    +'<ellipse cx="10" cy="107" rx="6" ry="3" fill="white"/>'
    +'<ellipse cx="20" cy="107" rx="6" ry="3" fill="white"/>'
    +'<line x1="4" y1="52" x2="-5" y2="70" stroke="'+ac+'" stroke-width="5" stroke-linecap="round"/>'
    +'<line x1="26" y1="52" x2="35" y2="68" stroke="'+ac+'" stroke-width="5" stroke-linecap="round"/>'
    +'<rect x="12" y="30" width="6" height="8" rx="2" fill="#f0c080"/>'
    +'<ellipse cx="15" cy="24" rx="12" ry="13" fill="#f0c080"/>'
    +'<path d="M3,18 Q0,8 15,6 Q30,8 27,18 Q22,10 15,11 Q8,10 3,18Z" fill="#f5d77e"/>'
    +'<path d="M3,18 Q-2,28 3,35" stroke="#f5d77e" stroke-width="4" stroke-linecap="round" fill="none"/>'
    +'<path d="M27,18 Q32,28 27,35" stroke="#f5d77e" stroke-width="4" stroke-linecap="round" fill="none"/>'
    +'<circle cx="11" cy="23" r="1.5" fill="#6b4226"/>'
    +'<circle cx="19" cy="23" r="1.5" fill="#6b4226"/>'
    +'<path d="M11,28 Q15,31 19,28" stroke="#c0604a" stroke-width="1.5" fill="none" stroke-linecap="round"/>'
    +'</g>';
}

function maxSVG(x,y,sc,flip,jacket){
  if(sc===undefined)sc=1; if(flip===undefined)flip=false; if(jacket===undefined)jacket=false;
  var t=flip?'transform="translate('+x+','+y+') scale('+ (-sc)+','+sc+') translate(-30,0)"':'transform="translate('+x+','+y+') scale('+sc+')"';
  var sc2=jacket?'#1a3a8a':'#1a1a1a';
  var ac=jacket?'#1a3a8a':'#f0c080';
  return '<g '+t+'>'
    +'<rect x="5" y="68" width="9" height="24" rx="3" fill="#3a5a9a"/>'
    +'<rect x="16" y="68" width="9" height="24" rx="3" fill="#3a5a9a"/>'
    +'<ellipse cx="9" cy="94" rx="7" ry="3" fill="white"/>'
    +'<ellipse cx="21" cy="94" rx="7" ry="3" fill="white"/>'
    +'<rect x="3" y="36" width="24" height="35" rx="4" fill="'+sc2+'"/>'
    +'<line x1="3" y1="45" x2="-7" y2="62" stroke="'+ac+'" stroke-width="5" stroke-linecap="round"/>'
    +'<line x1="27" y1="45" x2="37" y2="62" stroke="'+ac+'" stroke-width="5" stroke-linecap="round"/>'
    +'<rect x="11" y="22" width="8" height="16" rx="3" fill="#f0c080"/>'
    +'<ellipse cx="15" cy="18" rx="13" ry="14" fill="#f0c080"/>'
    +'<path d="M2,12 Q0,2 15,1 Q30,2 28,12 Q22,6 15,7 Q8,6 2,12Z" fill="#6b3a1f"/>'
    +'<circle cx="11" cy="17" r="1.5" fill="#4a2a10"/>'
    +'<circle cx="19" cy="17" r="1.5" fill="#4a2a10"/>'
    +'<path d="M11,22 Q15,25 19,22" stroke="#c0604a" stroke-width="1.5" fill="none" stroke-linecap="round"/>'
    +'</g>';
}

function randStars(n){
  var out='';
  for(var i=0;i<n;i++){
    var cx=(Math.random()*400)|0, cy=(Math.random()*220)|0;
    var r=(Math.random()*1.4+.3).toFixed(1);
    var op=(Math.random()*.5+.2).toFixed(2);
    var d=(Math.random()*3+2).toFixed(1);
    var lo=(+op*.3).toFixed(2);
    out+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="white" opacity="'+op+'"><animate attributeName="opacity" values="'+lo+';'+op+';'+lo+'" dur="'+d+'s" repeatCount="indefinite"/></circle>';
  }
  return out;
}

    +'<path d="M167,130 L233,130" stroke="#f5d77e" stroke-width="1.5" stroke-dasharray="4,4" opacity=".7"/>'
    +'<rect x="110" y="170" width="100" height="30" rx="15" fill="#4a90d9" opacity="0"><animate attributeName="opacity" values="0;.9;.9;0" dur="4s" repeatCount="indefinite"/></rect>'
    +'<text x="160" y="190" text-anchor="middle" fill="white" font-size="11" opacity="0">Hallo... <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/></text>'

    +'<text x="245" y="220" text-anchor="middle" fill="white" font-size="11" opacity="0">Hallo <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" begin="1.5s" repeatCount="indefinite"/></text>'
    +'<text x="30" y="60" fill="#f5d77e" font-size="16" opacity=".5">✦</text>'
    +'<text x="360" y="100" fill="#c9a96e" font-size="12" opacity=".4">✦</text>'
  );
}

function drawFernsehturm(el){
  el.innerHTML=mkSVG(
    '<defs><linearGradient id="skyA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a0a00"/><stop offset="50%" stop-color="#8b2500"/><stop offset="100%" stop-color="#e8600a"/></linearGradient></defs>'
    +'<rect width="400" height="280" fill="url(#skyA)"/>'
    +'<rect x="0" y="230" width="400" height="50" fill="#2a1505"/>'
    +'<rect x="192" y="20" width="16" height="165" rx="4" fill="#888"/>'
    +'<ellipse cx="200" cy="130" rx="30" ry="28" fill="#999"/>'
    +'<circle cx="200" cy="130" r="18" fill="#777"/>'
    +'<rect x="199" y="0" width="2" height="22" fill="#bbb"/>'
    +'<text x="60" y="80" fill="#e8600a" font-size="16">🍂<animateTransform attributeName="transform" type="translate" values="0,0;20,120" dur="4s" repeatCount="indefinite"/></text>'
    +'<text x="280" y="60" fill="#e8600a" font-size="18">🍂<animateTransform attributeName="transform" type="translate" values="0,0;10,130" dur="3.5s" begin=".5s" repeatCount="indefinite"/></text>'
    +'<text x="130" y="55" fill="#f5a020" font-size="14">🍁<animateTransform attributeName="transform" type="translate" values="0,0;-15,150" dur="5s" begin="1s" repeatCount="indefinite"/></text>'

    });
  });
}

function drawTischtennis(el){
  el.style.cssText+=';position:relative;overflow:hidden;border-radius:10px;background:#0d0d1a;';
  el.innerHTML='<canvas id="ttCanvas" style="position:absolute;inset:0;width:100%;height:100%;display:block;"></canvas>';
  var canvas=el.querySelector('#ttCanvas');
  setTimeout(function(){
    var W=el.offsetWidth||400, H=el.offsetHeight||280;
    canvas.width=W; canvas.height=H;
    var ctx=canvas.getContext('2d');
    var scoreMax=0, scoreSusi=0;
    var ball={x:W/2,y:H/2,vx:2.5,vy:2,r:7};
    var maxP={x:28,y:H/2,w:12,h:75};
    var susiP={x:W-28,y:H/2,w:12,h:75};
    var mouseY=H/2, serving=true, serveTimer=70;
    var flashText='', flashAlpha=0, rafId=null;
    function getY(e){var rect=canvas.getBoundingClientRect();var sy=H/rect.height;return e.touches?(e.touches[0].clientY-rect.top)*sy:(e.clientY-rect.top)*sy;}
    canvas.addEventListener('mousemove',function(e){mouseY=getY(e);});
    canvas.addEventListener('touchmove',function(e){e.preventDefault();mouseY=getY(e);},{passive:false});
    function resetBall(dir){ball.x=W/2;ball.y=H/2;var a=(Math.random()-.5)*.8,sp=2.8;ball.vx=dir*sp*Math.cos(a);ball.vy=sp*Math.sin(a);serving=true;serveTimer=70;}
    function drawTable(){
      ctx.fillStyle='#0d0d1a';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#1a5a2a';ctx.fillRect(30,H*.25,W-60,H*.5);
      ctx.strokeStyle='#2a8a3a';ctx.lineWidth=3;ctx.strokeRect(30,H*.25,W-60,H*.5);
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;ctx.setLineDash([6,6]);
      ctx.beginPath();ctx.moveTo(W/2,H*.25);ctx.lineTo(W/2,H*.75);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#ccc';ctx.fillRect(W/2-2,H*.22,4,H*.56);
      ctx.fillStyle='#aaa';ctx.fillRect(W/2-6,H*.22,12,5);ctx.fillRect(W/2-6,H*.78-5,12,5);
    }
    function drawPerson(cx,cy,hairCol,shirtCol){
      ctx.fillStyle='#3a5a9a';ctx.fillRect(cx-10,cy+28,8,28);ctx.fillRect(cx+2,cy+28,8,28);
      ctx.fillStyle='white';ctx.beginPath();ctx.ellipse(cx-6,cy+58,7,3,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx+6,cy+58,7,3,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=shirtCol;ctx.fillRect(cx-12,cy+4,24,28);
      ctx.fillStyle='#f0c080';ctx.beginPath();ctx.ellipse(cx,cy,13,14,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=hairCol;ctx.beginPath();ctx.ellipse(cx,cy-6,13,8,0,Math.PI,Math.PI*2);ctx.fill();
      ctx.fillStyle='#4a2a10';ctx.beginPath();ctx.arc(cx-5,cy-1,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx+5,cy-1,1.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#c0604a';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy+4,4,.2,Math.PI-.2);ctx.stroke();
    }
    function drawPaddle(p,col){
      ctx.fillStyle='#8b4513';ctx.fillRect(p.x-3,p.y+20,6,16);
      ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(p.x,p.y,7,p.h/2,0,0,Math.PI*2);ctx.fill();
    }
    function drawBall(){
      ctx.beginPath();ctx.ellipse(ball.x,ball.y+4,ball.r*.8,ball.r*.35,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fill();
      ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();
    }
    function drawScore(){
      ctx.font='bold 32px Georgia';ctx.textAlign='center';
      ctx.fillStyle='#a0c8ff';ctx.fillText(scoreMax,W/2-60,38);
      ctx.fillStyle='#f5d77e';ctx.fillText(':',W/2,38);
      ctx.fillStyle='#f5d77e';ctx.fillText(scoreSusi,W/2+60,38);
      ctx.font='11px Georgia';
      ctx.fillStyle='#a0c8ff';ctx.fillText('Max',W/2-60,54);
      ctx.fillStyle='#f5d77e';ctx.fillText('Susi',W/2+60,54);
    }
    function update(){
      if(serving){serveTimer--;if(serveTimer<=0)serving=false;return;}
      ball.x+=ball.vx;ball.y+=ball.vy;
      if(ball.y-ball.r<H*.25){ball.y=H*.25+ball.r;ball.vy=Math.abs(ball.vy);}
      if(ball.y+ball.r>H*.75){ball.y=H*.75-ball.r;ball.vy=-Math.abs(ball.vy);}
      susiP.y=Math.max(H*.25+susiP.h/2,Math.min(H*.75-susiP.h/2,mouseY));
      var sp2=2.2;
      if(maxP.y<ball.y-4)maxP.y+=sp2;else if(maxP.y>ball.y+4)maxP.y-=sp2;
      maxP.y=Math.max(H*.25+maxP.h/2,Math.min(H*.75-maxP.h/2,maxP.y));
      if(ball.vx<0&&ball.x-ball.r<maxP.x+8&&ball.x+ball.r>maxP.x-5&&ball.y>maxP.y-maxP.h/2&&ball.y<maxP.y+maxP.h/2){
        ball.x=maxP.x+8+ball.r;ball.vx=Math.abs(ball.vx)*1.03;ball.vy+=(ball.y-maxP.y)*.08;ball.vy=Math.max(-5,Math.min(5,ball.vy));
      }
      if(ball.vx>0&&ball.x+ball.r>susiP.x-8&&ball.x-ball.r<susiP.x+5&&ball.y>susiP.y-susiP.h/2&&ball.y<susiP.y+susiP.h/2){
        ball.x=susiP.x-8-ball.r;ball.vx=-Math.abs(ball.vx)*1.03;ball.vy+=(ball.y-susiP.y)*.08;ball.vy=Math.max(-5,Math.min(5,ball.vy));
      }
      var sp3=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
      if(sp3>7){ball.vx=ball.vx/sp3*7;ball.vy=ball.vy/sp3*7;}
      if(flashText==='💛 Punkt fuer Susi!')flashText='💛 Punkt für Susi!';
      if(flashText==='💙 Punkt fuer Max!')flashText='💙 Punkt für Max!';
      if(flashAlpha>0)flashAlpha-=.02;
    }
    function draw(){
      drawTable();
      drawPaddle(maxP,'#3a6aaa'); drawPaddle(susiP,'#c0282a');
      if(!serving)drawBall();
      else{ctx.font='bold 16px Georgia';ctx.textAlign='center';ctx.fillStyle='rgba(245,215,126,0.8)';ctx.fillText('• '.repeat(Math.max(1,Math.ceil(serveTimer/20))),W/2,H/2);}
      drawScore();
      if(flashAlpha>0){
        ctx.font='bold 28px Georgia';ctx.textAlign='center';
        ctx.fillStyle='rgba(245,215,126,'+Math.min(1,flashAlpha)+')';
        ctx.fillText(flashText,W/2,H/2-20);
      }
    }
    function loop(){update();draw();rafId=requestAnimationFrame(loop);}
    window._ttCleanup=function(){if(rafId)cancelAnimationFrame(rafId);};
    resetBall(1); loop();
  },80);
}

      +'background:linear-gradient(135deg,#f5d77e,#e8a44a);'

      +'font-family:Georgia,serif;font-size:.95rem;cursor:pointer;'
      +'box-shadow:0 4px 16px #f5d77e44;">Kapitel schreiben ✨</button>'
    +'<div id="nextChapResult" style="display:none;margin-top:24px;text-align:center;animation:popIn .5s ease;">'
    +'<div style="font-size:1.8rem;margin-bottom:8px;">💛</div>'
    +'<div id="nextChapText" style="font-family:Georgia,serif;font-style:italic;color:#f5d77e;font-size:clamp(1rem,2.5vw,1.3rem);text-shadow:0 0 20px #f5d77e88;line-height:1.6;max-width:300px;"></div>'
    +'<div style="margin-top:12px;font-size:.75rem;color:#c9a96e88;font-style:italic;">— Max &amp; Susi, Kapitel '+(chapters.length+1)+'</div>'
    +'<a id="mailLink" href="#" style="display:none;margin-top:16px;padding:10px 28px;background:linear-gradient(135deg,#f5d77e,#e8a44a);color:#2d1b4e;border-radius:50px;font-family:Georgia,serif;font-size:.9rem;text-decoration:none;box-shadow:0 4px 16px #f5d77e44;">&#x2709; An Max schicken</a>'
    +'</div>'
    +'</div>';

  setTimeout(function(){
    var btn=el.querySelector('#nextChapBtn');
    var inp=el.querySelector('#nextChapInput');
    var result=el.querySelector('#nextChapResult');
    var txt=el.querySelector('#nextChapText');
    if(!btn||!inp)return;
    function submit(){
      var val=inp.value.trim();
      if(!val)return;
      txt.textContent='"'+val+'"';
      inp.style.display='none';
      btn.style.display='none';
      result.style.display='block';
      var subject=encodeURIComponent('Unser nächstes Kapitel 💛');
      var body=encodeURIComponent('Lieber Max,\n\nunser nächstes Kapitel soll sein:\n\n\u201E'+val+'\u201C\n\n\u2014 Susi');
      var href='mailto:maximilianrettig@gmx.net?subject='+subject+'&body='+body;
      var mailBtn=el.querySelector('#mailLink');
      mailBtn.onclick=function(){window.open(href,'_blank');return false;};
      mailBtn.style.display='inline-block';
    }
    btn.addEventListener('click',submit);
    inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit();}});
  },50);
}

// ── navigation ────────────────────────────────────────────────────
var current=0;
var overlay=document.getElementById('overlay');
var scene=document.getElementById('scene');

function renderChapter(){
  var ch=chapters[current];
  scene.className=''; scene.style.display='flex'; scene.classList.add(ch.bg);
  document.getElementById('chapNum').textContent=ch.num;
  document.getElementById('chapTitle').textContent=ch.title;
  document.getElementById('chapText').textContent=ch.text;
  document.getElementById('chapHint').textContent=ch.hint;
  var il=document.getElementById('illus'); il.innerHTML=''; il.removeAttribute('style');
  ch.draw(il);
  var svg=il.querySelector('svg');
  if(svg){
    svg.addEventListener('click',function(e){
      var t=e.target;
      while(t&&t!==svg){
        if(t.dataset&&t.dataset.popup){showPopup(t.dataset.popup,e.clientX,e.clientY);return;}
        t=t.parentElement;
      }
    });
  }
  var dotsEl=document.getElementById('dots');
  dotsEl.innerHTML=chapters.map(function(_,i){return '<div class="dot'+(i===current?' active':'')+'"></div>';}).join('');
  Array.from(dotsEl.children).forEach(function(d,i){d.addEventListener('click',function(){jumpTo(i);});});
  document.getElementById('prevBtn').disabled=current===0;
  document.getElementById('nextBtn').disabled=current===chapters.length-1;
}

function navigate(dir){
  if(window._ttCleanup){window._ttCleanup();window._ttCleanup=null;}
  overlay.classList.add('fade-in');
  setTimeout(function(){current=Math.max(0,Math.min(chapters.length-1,current+dir));renderChapter();overlay.classList.remove('fade-in');},600);
}
function jumpTo(i){
  if(window._ttCleanup){window._ttCleanup();window._ttCleanup=null;}
  overlay.classList.add('fade-in');
  setTimeout(function(){current=i;renderChapter();overlay.classList.remove('fade-in');},400);
}

document.getElementById('prevBtn').addEventListener('click',function(){navigate(-1);});
document.getElementById('nextBtn').addEventListener('click',function(){navigate(1);});
document.getElementById('startBtn').addEventListener('click',function(){
  var cover=document.getElementById('cover');
  cover.style.opacity='0'; cover.style.pointerEvents='none';
  setTimeout(function(){cover.style.display='none';},1500);
  current=0; renderChapter();
});
</script>
